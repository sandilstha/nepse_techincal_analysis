<div class="row mt-2">
  <div class="col-12">
    <div class="d-flex gap-2 flex-wrap align-items-center quick-range-row">
      <span class="text-muted small fw-medium" style="font-size:11px;">Quick Range:</span>
      <button type="button" class="btn btn-outline-secondary btn-sm px-2 py-1" style="font-size:11px; border-radius:6px;" data-date-range="6m" data-from-id="{{ from_id }}" data-to-id="{{ to_id }}">6M</button>
      <button type="button" class="btn btn-outline-secondary btn-sm px-2 py-1" style="font-size:11px; border-radius:6px;" data-date-range="1y" data-from-id="{{ from_id }}" data-to-id="{{ to_id }}">1Y</button>
      <button type="button" class="btn btn-outline-secondary btn-sm px-2 py-1" style="font-size:11px; border-radius:6px;" data-date-range="2y" data-from-id="{{ from_id }}" data-to-id="{{ to_id }}">2Y</button>
      <button type="button" class="btn btn-outline-secondary btn-sm px-2 py-1" style="font-size:11px; border-radius:6px;" data-date-range="3y" data-from-id="{{ from_id }}" data-to-id="{{ to_id }}">3Y</button>
      <button type="button" class="btn btn-outline-secondary btn-sm px-2 py-1" style="font-size:11px; border-radius:6px;" data-date-range="ytd" data-from-id="{{ from_id }}" data-to-id="{{ to_id }}">YTD</button>
      <span class="text-muted ms-1" style="font-size:11px;">&#9651; Stage needs &ge;150 trading days -- use 1Y or longer</span>
    </div>
  </div>
</div>
