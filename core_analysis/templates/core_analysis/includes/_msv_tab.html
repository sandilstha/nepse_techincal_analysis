    <div class="tab-pane fade {% if active_tab == 'msv_backtest' %}show active{% endif %}" id="msv-backtest-pane" role="tabpanel">
      <div class="card card-body mb-4 border-0 shadow-sm rounded-3 p-4">
        <h5 class="mb-2" style="font-size: 14px; font-weight: 700; color: var(--ink-1);">Momentum Scan Parameters</h5>
        <form method="GET" action="." id="msvForm">
          <input type="hidden" name="active_tab" value="msv_backtest">
          <input type="hidden" name="msv_backtest_symbol" id="msvSymbolHidden" value="{{ msv_selected_symbol }}">

          <div class="row g-3 align-items-end">
            <div class="col-md-3">
              <label class="form-label text-muted small fw-medium">Target Asset <span style="color: #9ca3af; font-size: 11px;">(Search)</span></label>
              <div class="autocomplete-wrapper">
                <input type="text"
                       class="autocomplete-input"
                       id="msvSearchInput"
                       placeholder="Type to search..."
                       value="{{ msv_selected_symbol }}"
                       autocomplete="off">
                <div class="autocomplete-dropdown" id="msvDropdown"></div>
              </div>
            </div>
            <div class="col-md-2">
              <label class="form-label text-muted small fw-medium">From Date</label>
              <input type="text" id="msvFromDate" name="msv_from_date" class="form-control form-control-sm" value="{{ msv_from_date }}" required autocomplete="off" placeholder="YYYY-MM-DD">
            </div>
            <div class="col-md-2">
              <label class="form-label text-muted small fw-medium">To Date</label>
              <input type="text" id="msvToDate" name="msv_to_date" class="form-control form-control-sm" value="{{ msv_to_date }}" required autocomplete="off" placeholder="YYYY-MM-DD">
            </div>
            <div class="col-md-1">
              <label class="form-label text-muted small fw-medium">MACD Fast</label>
              <input type="number" min="1" step="1" name="msv_macd_fast" class="form-control form-control-sm" value="{{ msv_macd_fast }}" required>
            </div>
            <div class="col-md-1">
              <label class="form-label text-muted small fw-medium">MACD Slow</label>
              <input type="number" min="2" step="1" name="msv_macd_slow" class="form-control form-control-sm" value="{{ msv_macd_slow }}" required>
            </div>
            <div class="col-md-1">
              <label class="form-label text-muted small fw-medium">MACD Signal</label>
              <input type="number" min="1" step="1" name="msv_macd_signal" class="form-control form-control-sm" value="{{ msv_macd_signal }}" required>
            </div>
            <div class="col-md-1">
              <label class="form-label text-muted small fw-medium">ATR Len</label>
              <input type="number" min="2" step="1" name="msv_atr_length" class="form-control form-control-sm" value="{{ msv_atr_length }}" required>
            </div>
            <div class="col-md-1">
              <label class="form-label text-muted small fw-medium">ATR Mult</label>
              <input type="number" min="0.1" step="0.1" name="msv_atr_multiplier" class="form-control form-control-sm" value="{{ msv_atr_multiplier }}" required>
            </div>
          </div>

          <div class="row g-3 align-items-end mt-1">
            <div class="col-md-2">
              <label class="form-label text-muted small fw-medium">RVOL Period</label>
              <input type="number" min="2" step="1" name="msv_rvol_period" class="form-control form-control-sm" value="{{ msv_rvol_period }}" required>
            </div>
            <div class="col-md-2">
              <label class="form-label text-muted small fw-medium">RVOL Threshold</label>
              <input type="number" min="0.1" step="0.1" name="msv_rvol_threshold" class="form-control form-control-sm" value="{{ msv_rvol_threshold }}" required>
            </div>
            <div class="col-md-2">
              <label class="form-label text-muted small fw-medium">Supertrend Len</label>
              <input type="number" min="2" step="1" name="msv_supertrend_length" class="form-control form-control-sm" value="{{ msv_supertrend_length }}" required>
            </div>
            <div class="col-md-2">
              <label class="form-label text-muted small fw-medium">Supertrend Mult</label>
              <input type="number" min="0.1" step="0.1" name="msv_supertrend_multiplier" class="form-control form-control-sm" value="{{ msv_supertrend_multiplier }}" required>
            </div>
            <div class="col-md-2">
              <button type="submit" class="btn btn-primary btn-sm w-100 fw-medium py-2 rounded-2">Execute MSV Model</button>
            </div>
          </div>
          {% include "core_analysis/includes/_quick_range_controls.html" with from_id="msvFromDate" to_id="msvToDate" %}
        </form>
      </div>

      <div class="tab-ajax-results" id="msv_backtestResults" data-tab-key="msv_backtest">
        {% include "core_analysis/includes/_msv_results.html" %}
      </div>
    </div>
